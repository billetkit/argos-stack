[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "billetkit-voice-grader"
version = "0.1.0"
description = "MCP server for AI-slop detection and 2026 anti-tell voice grading. Drop in front of any LLM that produces customer-facing prose."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [
    { name = "billetkit", email = "billetkit@proton.me" }
]
keywords = ["mcp", "ai-detection", "voice-grader", "pangram", "gptzero", "ai-slop", "content-quality"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27.0",
]

[project.scripts]
billetkit-voice-grader = "billetkit_voice_grader.server:main"

[project.urls]
Homepage = "https://github.com/billetkit/argos-stack"
Repository = "https://github.com/billetkit/argos-stack"
Issues = "https://github.com/billetkit/argos-stack/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/billetkit_voice_grader"]
